name: Release SmartFuseBox Firmware

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        board:
          - { name: "esp32", fqbn: "esp32:esp32:esp32" }
          - { name: "esp32s3", fqbn: "esp32:esp32:esp32s3" }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install required libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "SerialCommandManager"
          arduino-cli lib install "SensorManager"
          arduino-cli lib install "SdFat"
          arduino-cli lib install "DHT11"

      - name: Generate FirmwareVersion.h
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$VERSION"

          printf "#pragma once\n#include <Arduino.h>\n\n// Generated by CI from tag %s - do not edit manually.\nconstexpr uint8_t FirmwareMajor = %s;\nconstexpr uint8_t FirmwareMinor = %s;\nconstexpr uint8_t FirmwarePatch = %s;\nconstexpr uint8_t FirmwareBuild = %s;\n" "$TAG" "$MAJOR" "$MINOR" "$PATCH" "$BUILD" > SmartFuseBox/FirmwareVersion.h

      - name: Compile SmartFuseBox firmware
        run: |
          arduino-cli compile \
            --fqbn ${{ matrix.board.fqbn }} \
            --output-dir SmartFuseBox/build/${{ matrix.board.name }} \
            SmartFuseBox

      - name: Rename and checksum firmware binary
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SRC="SmartFuseBox/build/${{ matrix.board.name }}/SmartFuseBox.ino.bin"
          DEST="SmartFuseBox-${{ matrix.board.name }}-${TAG}.bin"
          cp "$SRC" "$DEST"
          sha256sum "$DEST" | awk '{print $1}' > "SmartFuseBox-${{ matrix.board.name }}-${TAG}.sha256"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board.name }}
          path: |
            SmartFuseBox-${{ matrix.board.name }}-*.bin
            SmartFuseBox-${{ matrix.board.name }}-*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Debug files
        run: ls -R
        
      - name: Prepare release files
        run: |
          mkdir release
          find . -name "*.bin" -exec cp {} release/ \;
          find . -name "*.sha256" -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
